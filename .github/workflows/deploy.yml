name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build & push images to ghcr
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalize owner to lowercase
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Collect metadata
        id: meta
        run: |
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "repo=${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/${{ steps.meta.outputs.repo }}-api:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.name }}/${{ steps.meta.outputs.repo }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/${{ steps.meta.outputs.repo }}-web:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.name }}/${{ steps.meta.outputs.repo }}-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: deploy to ec2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/webtest

            OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
            REPO='${{ github.event.repository.name }}'

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            export API_IMAGE="ghcr.io/$OWNER/$REPO-api:${{ github.sha }}"
            export WEB_IMAGE="ghcr.io/$OWNER/$REPO-web:${{ github.sha }}"

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Migrations run as the one-shot `migrate` service which executes on `up` and exits.
            # Prune dangling images to free disk.
            docker image prune -f
