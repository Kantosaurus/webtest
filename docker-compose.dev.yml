# Dev/local-test overrides: publish web port to host so e2e can target it directly,
# bypassing caddy (which requires a public DNS name for cert acquisition).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  web:
    ports:
      - "3000:3000"
  api:
    ports:
      - "4000:4000"
  db:
    ports:
      - "5432:5432"
